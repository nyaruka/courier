name: CI
on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: golang:1.26-trixie

    services:
      valkey:
        image: valkey/valkey:8.1-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: courier_test
          POSTGRES_USER: courier_test
          POSTGRES_PASSWORD: temba
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      localstack:
        image: localstack/localstack:4.14
        env:
          SERVICES: s3,dynamodb,cloudwatch
        ports:
          - 4566:4566

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get Go cache paths
        id: go-cache-paths
        run: |
          echo "gomodcache=$(go env GOMODCACHE)" >> $GITHUB_OUTPUT
          echo "gocache=$(go env GOCACHE)" >> $GITHUB_OUTPUT
          echo "goversion=$(go env GOVERSION)" >> $GITHUB_OUTPUT

      - name: Cache Go modules and build cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.go-cache-paths.outputs.gomodcache }}
            ${{ steps.go-cache-paths.outputs.gocache }}
          key: go-${{ steps.go-cache-paths.outputs.goversion }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ steps.go-cache-paths.outputs.goversion }}-
            go-

      - name: Compile tests
        # pre-compiles all test binaries with default parallelism since -p=1 in the real run serializes
        # compilation as well as test execution
        run: |
          go test -run '^$' -cover ./...

      - name: Run tests
        run: go test -p=1 -cover ./...

  release:
    name: Release
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    container:
      image: golang:1.26-trixie

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fix git safe directory
        run: git config --global --add safe.directory /__w/courier/courier

      - name: Publish release
        uses: goreleaser/goreleaser-action@v7
        if: ${{ !contains(github.ref, '-') }}
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish non-master release
        uses: goreleaser/goreleaser-action@v7
        if: contains(github.ref, '-')
        with:
          args: release --clean --skip-validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
